<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autospend — Maintenance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Figtree', sans-serif;
        background-color: #0F0E0E;
        color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
      }
      .container {
        text-align: center;
        max-width: 600px;
      }
      h1 {
        font-family: 'Anton', sans-serif;
        font-size: clamp(48px, 8vw, 72px);
        font-weight: 400;
        text-transform: uppercase;
        line-height: 1;
        margin-bottom: 24px;
        letter-spacing: -1.5px;
      }
      p {
        font-size: clamp(18px, 3vw, 24px);
        color: rgba(255, 255, 255, 0.7);
        line-height: 1.6;
        margin-bottom: 16px;
      }
      .status {
        display: inline-block;
        padding: 12px 24px;
        background-color: rgba(96, 128, 219, 0.1);
        border: 1px solid rgba(96, 128, 219, 0.3);
        border-radius: 8px;
        color: #6080DB;
        font-weight: 600;
        margin-top: 32px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Under Maintenance</h1>
      <p>This site is temporarily unavailable while we make improvements.</p>
      <p>Please check back soon.</p>
      <div class="status">🔧 Maintenance Mode</div>
    </div>
    <!-- React app disabled for maintenance -->
    <!-- <div id="root"></div> -->
    <!-- <script type="module" src="/src/main.jsx"></script> -->
  </body>
</html>
